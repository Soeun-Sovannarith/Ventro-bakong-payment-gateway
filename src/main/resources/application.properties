spring.application.name=Ventro_Bakong
server.port=8080

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.config.import=optional:file:.env[.properties]

bakong.account.id=${BAKONG_ACCOUNT_ID}
bakong.account.phone=${BAKONG_ACCOUNT_PHONE}
bakong.acquiring.bank=${BAKONG_ACQUIRING_BANK}
bakong.merchant.name=${BAKONG_MERCHANT_NAME}
bakong.merchant.city=${BAKONG_MERCHANT_CITY}
bakong.store.label=${BAKONG_STORE_LABEL}
bakong.terminal.label=${BAKONG_TERMINAL_LABEL}
bakong.api.token=${BAKONG_API_TOKEN}
bakong.api.base.url=${BAKONG_API_BASE_URL}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

mybatis.configuration.map-underscore-to-camel-case=true
